<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FileDropp — Download File</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #555555;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    /* Loading */
    #loading {
      text-align: center;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Error */
    #error-view {
      display: none;
      text-align: center;
      max-width: 400px;
    }

    .error-icon { font-size: 3rem; margin-bottom: 20px; }

    .error-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .error-sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* File card */
    #file-card {
      display: none;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-label::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    .file-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      margin-bottom: 16px;
    }

    .file-icon-big {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 20px;
    }

    .file-display-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .file-display-type {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      background: #141400;
      display: inline-block;
      padding: 3px 8px;
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .file-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .stat {
      background: #0d0d0d;
      padding: 14px 16px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 0.82rem;
    }

    #download-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 12px;
    }

    #download-btn:hover { background: #d4eb2e; }
    #download-btn:active { transform: scale(0.99); }

    .back-link {
      display: block;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text); }

    footer {
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <a class="logo" href="/">
      <div class="logo-dot"></div>
      FileDropp
    </a>
  </header>

  <main>
    <!-- Loading state -->
    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">FETCHING FILE INFO…</div>
    </div>

    <!-- Error state -->
    <div id="error-view">
      <div class="error-icon">🚫</div>
      <div class="error-title">File not found</div>
      <div class="error-sub">This link may have expired or the file was removed.</div>
      <a href="/" style="font-family:var(--mono);font-size:0.8rem;color:var(--accent);text-decoration:none;">← Upload a new file</a>
    </div>

    <!-- File card -->
    <div id="file-card">
      <div class="card-label">File ready to download</div>
      <div class="file-display">
        <span class="file-icon-big" id="fc-icon">📄</span>
        <div class="file-display-name" id="fc-name">filename.txt</div>
        <div class="file-display-type" id="fc-type">TXT</div>
        <div class="file-stats">
          <div class="stat">
            <div class="stat-label">Size</div>
            <div class="stat-value" id="fc-size">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Downloads</div>
            <div class="stat-value" id="fc-downloads">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Uploaded</div>
            <div class="stat-value" id="fc-date">—</div>
          </div>
        </div>
      </div>
      <a id="download-btn" href="#">⬇ Download File</a>
      <a class="back-link" href="/">← Upload your own file</a>
    </div>
  </main>

  <footer>
    <span class="footer-text">FileDropp · no login required</span>
  </footer>
</div>

<script>
  const ICONS = {
    image: '🖼️', video: '🎬', audio: '🎵', pdf: '📋',
    zip: '📦', text: '📄', default: '📄'
  };

  function getIcon(type, name) {
    if (!type) return ICONS.default;
    if (type.startsWith('image')) return ICONS.image;
    if (type.startsWith('video')) return ICONS.video;
    if (type.startsWith('audio')) return ICONS.audio;
    if (type === 'application/pdf') return ICONS.pdf;
    if (type.includes('zip') || type.includes('compressed')) return ICONS.zip;
    if (type.startsWith('text')) return ICONS.text;
    return ICONS.default;
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  async function loadFile() {
    const id = location.pathname.split('/share/')[1];
    if (!id) { showError(); return; }

    try {
      const res = await fetch('/api/file/' + id);
      if (!res.ok) { showError(); return; }
      const file = await res.json();
      showFile(file);
    } catch {
      showError();
    }
  }

  function showFile(file) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fc-icon').textContent = getIcon(file.mimetype, file.originalName);
    document.getElementById('fc-name').textContent = file.originalName;
    document.getElementById('fc-type').textContent = (file.mimetype || 'file').split('/')[1]?.toUpperCase() || 'FILE';
    document.getElementById('fc-size').textContent = file.sizeFormatted;
    document.getElementById('fc-downloads').textContent = file.downloads;
    document.getElementById('fc-date').textContent = timeAgo(file.uploadedAt);
    document.getElementById('download-btn').href = '/download/' + file.id;
    document.title = 'FileDropp — ' + file.originalName;
    document.getElementById('file-card').style.display = 'block';
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-view').style.display = 'block';
  }

  loadFile();
</script>
</body>
</html>
