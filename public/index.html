<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FileDropp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e8ff47;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1;
      padding: 24px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .line { margin-bottom: 4px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .dim    { color: #555; }
    .white  { color: #f0f0f0; }
    .green  { color: #88ff00; }
    .red    { color: #ff5555; }
    .cyan   { color: #55ffff; }
    .input-row { display: flex; align-items: center; margin: 4px 0; }
    .prompt { color: #e8ff47; margin-right: 8px; white-space: nowrap; }
    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      caret-color: #e8ff47;
    }
    #file-input { display: none; }
  </style>
</head>
<body>
<div id="terminal"></div>
<input type="file" id="file-input"/>
<script>
  const terminal = document.getElementById('terminal');
  const fileInput = document.getElementById('file-input');
  let state = 'idle';
  let uploadedFileId = null;
  let uploadedShareUrl = null;

  function print(text, cls) {
    const d = document.createElement('div');
    d.className = 'line' + (cls ? ' ' + cls : '');
    d.textContent = text;
    terminal.appendChild(d);
    window.scrollTo(0, document.body.scrollHeight);
  }

  function showPrompt(promptText) {
    const row = document.createElement('div');
    row.className = 'input-row';
    const p = document.createElement('span');
    p.className = 'prompt';
    p.textContent = promptText;
    const input = document.createElement('input');
    input.id = 'cmd-input';
    input.type = 'text';
    input.autocomplete = 'off';
    input.spellcheck = false;
    row.appendChild(p);
    row.appendChild(input);
    terminal.appendChild(row);
    input.focus();
    window.scrollTo(0, document.body.scrollHeight);
    input.addEventListener('keydown', async function(e) {
      if (e.key !== 'Enter') return;
      const val = input.value.trim();
      input.disabled = true;
      row.remove();
      print(promptText + val, 'dim');
      await handleInput(val);
    });
  }

  async function handleInput(val) {
    if (state === 'idle') {
      if (val === 'upload') {
        print('');
        print('Opening file picker...', 'dim');
        state = 'waiting_file';
        fileInput.click();
      } else if (val === 'help') {
        printHelp();
        print('');
        showPrompt('> ');
      } else if (val === 'clear') {
        terminal.innerHTML = '';
        showPrompt('> ');
      } else if (val === '') {
        showPrompt('> ');
      } else {
        print('Unknown command: ' + val + '   (type help)', 'red');
        print('');
        showPrompt('> ');
      }
    } else if (state === 'waiting_email') {
      if (val === 'skip') {
        print('');
        print('Skipped email.', 'dim');
        printDone();
      } else {
        await sendEmail(val);
      }
    }
  }

  function printHelp() {
    print('Commands:', 'white');
    print('  upload   — pick a file and upload it', 'dim');
    print('  clear    — clear the screen', 'dim');
    print('  help     — show this message', 'dim');
  }

  fileInput.addEventListener('change', async function() {
    const file = fileInput.files[0];
    if (!file) {
      print('No file selected.', 'red');
      state = 'idle';
      showPrompt('> ');
      return;
    }
    print('');
    print('File: ' + file.name + ' (' + formatBytes(file.size) + ')', 'white');
    print('Uploading...', 'dim');
    await uploadFile(file);
    fileInput.value = '';
  });

  async function uploadFile(file) {
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Upload failed');
      uploadedFileId = data.id;
      uploadedShareUrl = window.location.origin + data.shareUrl;
      print('');
      print('Upload complete!', 'green');
      print('');
      print('Share link:', 'white');
      print('  ' + uploadedShareUrl, 'cyan');
      print('');
      print('Send link to an email? Type address or "skip":', 'white');
      state = 'waiting_email';
      showPrompt('email> ');
    } catch (err) {
      print('');
      print('Upload failed: ' + err.message, 'red');
      print('');
      state = 'idle';
      showPrompt('> ');
    }
  }

  async function sendEmail(to) {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) {
      print('Invalid email. Try again or type "skip":', 'red');
      showPrompt('email> ');
      return;
    }
    print('Sending to ' + to + '...', 'dim');
    try {
      const res = await fetch('/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: to, fileId: uploadedFileId, shareUrl: uploadedShareUrl })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed');
      print('Email sent to ' + to, 'green');
      printDone();
    } catch (err) {
      print('Email error: ' + err.message, 'red');
      printDone();
    }
  }

  function printDone() {
    print('');
    print('─────────────────────────────', 'dim');
    print('');
    uploadedFileId = null;
    uploadedShareUrl = null;
    state = 'idle';
    showPrompt('> ');
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(2) + ' MB';
  }

  print('FileDropp v1.0', 'yellow');
  print('─────────────────────────────', 'dim');
  print('');
  printHelp();
  print('');
  showPrompt('> ');
</script>
</body>
</html>
